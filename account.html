<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="description" content="seiya 个人网站账户页" />
  <title>Account | seiya</title>
  <link rel="icon" type="image/png" href="./assets/favicon.png" />
  <link rel="stylesheet" href="./css/auth.css" />
  <link rel="stylesheet" href="./css/account.css" />
</head>
<body>
  <header class="account-header">
    <nav class="account-nav" aria-label="账户页导航">
      <a class="account-back" href="./index.html">← Back to Home</a>
      <a class="account-brand" href="./index.html" aria-label="返回 seiya 首页">
        <img src="./assets/favicon.png" alt="" width="24" height="24" />
        <span>seiya</span>
      </a>
    </nav>
  </header>

  <main class="account-main">
    <section class="account-shell" aria-labelledby="accountTitle">
      <div class="account-heading">
        <p>Personal Website</p>
        <h1 id="accountTitle">Account</h1>
      </div>

      <article class="account-card" id="signedOutView">
        <p class="account-kicker">Not signed in</p>
        <h2>登录后可以发表评论</h2>
        <p>登录后可以发表评论、查看账户状态，未来也可以管理评论、收藏和账户设置。</p>
        <div class="account-actions">
          <button class="account-primary" type="button" id="accountSignIn">Sign in</button>
          <button class="account-secondary" type="button" id="accountSignUp">Create account</button>
        </div>
      </article>

      <article class="account-card" id="signedInView" hidden>
        <div class="account-profile">
          <span class="account-avatar" id="accountAvatar" aria-hidden="true">A</span>
          <div>
            <p class="account-kicker">Signed in</p>
            <h2 id="accountName">Account</h2>
          </div>
        </div>

        <dl class="account-details">
          <div>
            <dt>Email</dt>
            <dd id="accountEmail">-</dd>
          </div>
          <div>
            <dt>User ID</dt>
            <dd id="accountUserId">-</dd>
          </div>
          <div>
            <dt>Status</dt>
            <dd>signed in</dd>
          </div>
          <div>
            <dt>Email verified</dt>
            <dd id="accountVerified">-</dd>
          </div>
        </dl>

        <div class="account-actions">
          <button class="account-primary" type="button" id="accountSignOut">Sign out</button>
          <a class="account-secondary account-home-link" href="./index.html">Back to Home</a>
        </div>
      </article>

      <section class="account-future" aria-label="未来账户功能">
        <article>
          <h3>My Comments</h3>
          <p>Coming soon</p>
        </article>
        <article>
          <h3>My Favorites</h3>
          <p>Coming soon</p>
        </article>
        <article>
          <h3>Settings</h3>
          <p>Coming soon</p>
        </article>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/comments-config.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/account.js"></script>
</body>
</html>
