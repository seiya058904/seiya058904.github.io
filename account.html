<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://ppt-likes-api.seiya-api.workers.dev https://rqzaidftxbfdwlzqdtep.supabase.co; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; base-uri 'self'; form-action 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="description" content="seiya 个人网站账户页" />
  <title>Account | seiya</title>
  <link rel="icon" type="image/png" href="./assets/favicon.png" />
  <link rel="stylesheet" href="./css/auth.css" />
  <link rel="stylesheet" href="./css/account.css" />
</head>
<body>
  <header class="account-header">
    <nav class="account-nav" aria-label="账户导航">
      <a class="account-back" href="./index.html">返回 Back</a>
      <a class="account-brand" href="./index.html" aria-label="返回 seiya 首页">
        <img src="./assets/favicon.png" alt="" width="24" height="24" />
        <span>seiya</span>
      </a>
    </nav>
  </header>

  <main class="account-main">
    <section class="account-card" aria-labelledby="accountTitle">
      <div class="account-title">
        <p>我的账户</p>
        <h1 id="accountTitle">Account</h1>
      </div>

      <article class="account-state" id="accountLoadingView">
        <div class="account-avatar account-avatar--quiet" aria-hidden="true">A</div>
        <p class="account-status-line">加载中 <span>Loading...</span></p>
      </article>

      <article class="account-state" id="signedOutView" hidden>
        <div class="account-avatar account-avatar--quiet" aria-hidden="true">A</div>
        <p class="account-status-line">未登录 <span>Not signed in</span></p>
        <div class="account-actions">
          <button class="account-primary" type="button" id="accountSignIn">登录 Sign in</button>
          <button class="account-secondary" type="button" id="accountSignUp">注册 Create account</button>
          <a class="account-secondary account-home-link" href="./index.html">返回 Back</a>
        </div>
      </article>

      <article class="account-state" id="signedInView" hidden>
        <div class="account-profile">
          <span class="account-avatar" id="accountAvatar" aria-hidden="true">A</span>
          <div class="account-email-block">
            <span>邮箱 Email</span>
            <strong id="accountEmail">-</strong>
          </div>
        </div>

        <form class="account-profile-form" id="accountProfileForm">
          <label for="accountDisplayName">显示名称 <span>Display name</span></label>
          <div class="account-profile-row">
            <input type="text" id="accountDisplayName" maxlength="24" autocomplete="nickname" placeholder="seiya" />
            <button class="account-primary" type="submit" id="accountProfileSave">保存 Save</button>
            <button class="account-secondary account-profile-reset" type="button" id="accountProfileReset" hidden>重置 Reset</button>
          </div>
          <p class="account-profile-help" id="accountProfileHelp">评论区将显示此名称 <span>Shown with your comments</span></p>
          <p class="account-profile-status" id="accountProfileStatus" role="status"></p>
        </form>

        <div class="account-actions account-actions--bottom">
          <button class="account-secondary" type="button" id="accountSignOut">退出 Sign out</button>
          <a class="account-secondary account-home-link" href="./index.html">返回 Back</a>
        </div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/comments-config.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/profile.js"></script>
  <script src="./js/account.js"></script>
</body>
</html>
